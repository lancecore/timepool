server {
    listen 80;
    listen [::]:80;
    server_name timepool.example.org;

    root /var/www/timepool;          # the project root IS the docroot
    index index.php;

    client_max_body_size 10m;        # logo uploads

    # Never serve runtime data or app source.
    # ^~ (not ~) is deliberate: a regex location would compete with the
    # \.php$ block below on order, and /data/config.php could reach PHP.
    # ^~ prefix matches beat all regex locations regardless of order.
    location ^~ /data/ { deny all; }
    location ^~ /app/  { deny all; }

    # Certbot challenges (must sit above the dotfile deny)
    location ^~ /.well-known/ { allow all; }

    # Mirrors the .htaccess hardening: no SQLite files, no dotfiles
    location ~ \.(sqlite|sqlite-wal|sqlite-shm)$ { deny all; }
    location ~ /\. { deny all; }

    # Static assets: cache a year; asset_url() appends ?v=<mtime> to bust on upgrade
    location ~ \.(css|js|svg|png|jpe?g|webp|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # Front controller: real files served as-is, everything else -> index.php
    location / {
        try_files $uri /index.php?$args;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;   # adjust to your PHP-FPM version/socket
    }
}
